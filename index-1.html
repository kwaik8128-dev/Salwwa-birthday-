<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Happy Birthday Salwa ❤️</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Tajawal:wght@300;400;500;700;900&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width:100%;
    overflow-x:hidden;
    font-family:'Tajawal', sans-serif;
    background:#0d0715;
    color:#fff;
    scroll-behavior:smooth;
  }

  /* ===================== INTRO ===================== */
  #intro {
    position:fixed;
    inset:0;
    background:#000;
    z-index:9999;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    transition:opacity 1.4s ease;
  }
  #intro.hide { opacity:0; pointer-events:none; }

  .intro-heart {
    font-size:3rem;
    opacity:0;
    animation: heartPulseIntro 1.8s ease-in-out infinite;
  }
  @keyframes heartPulseIntro {
    0%,100% { transform:scale(1); opacity:.6; }
    50% { transform:scale(1.25); opacity:1; }
  }

  .intro-text {
    margin-top:28px;
    font-size:1.15rem;
    font-weight:500;
    color:#f3d9e8;
    text-align:center;
    padding:0 30px;
    min-height:1.6em;
    white-space:nowrap;
    overflow:hidden;
    border-left:2px solid #f3d9e8;
    display:inline-block;
    opacity:0;
  }

  /* ===================== BACKGROUND ===================== */
  .bg-gradient {
    position:fixed;
    inset:0;
    z-index:0;
    background: linear-gradient(120deg, #2b0f3a, #4a1942, #200a30, #3a1250);
    background-size: 300% 300%;
    animation: breathe 14s ease-in-out infinite;
  }
  @keyframes breathe {
    0% { background-position:0% 50%; }
    50% { background-position:100% 50%; }
    100% { background-position:0% 50%; }
  }

  canvas#stars, canvas#hearts, canvas#touch, canvas#fireworks {
    position:fixed;
    inset:0;
    z-index:1;
    pointer-events:none;
    width:100%;
    height:100%;
  }
  canvas#touch { z-index:3; pointer-events:none; }

  /* ===================== CONTENT ===================== */
  main {
    position:relative;
    z-index:2;
    width:100%;
    max-width:560px;
    margin:0 auto;
    padding:60px 20px 100px;
  }

  .reveal {
    opacity:0;
    transform:translateY(40px);
    transition:opacity 1s ease, transform 1s ease;
  }
  .reveal.in {
    opacity:1;
    transform:translateY(0);
  }

  /* Title */
  .title-wrap {
    text-align:center;
    margin-bottom:50px;
  }
  .title-en {
    font-family:'Aref Ruqaa', serif;
    font-size:clamp(1.6rem, 6vw, 2.4rem);
    color:#ffdff2;
    text-shadow:0 0 20px rgba(255,150,220,.5);
    animation: dropIn 1.2s ease forwards, pulseTitle 3s ease-in-out 1.2s infinite;
    opacity:0;
  }
  @keyframes dropIn {
    from { opacity:0; transform:translateY(-60px); }
    to { opacity:1; transform:translateY(0); }
  }
  @keyframes pulseTitle {
    0%,100% { transform:scale(1); }
    50% { transform:scale(1.04); }
  }
  .title-ar {
    font-family:'Aref Ruqaa', serif;
    font-size:clamp(1.4rem, 5vw, 1.9rem);
    color:#f6c6e0;
    margin-top:12px;
    opacity:0;
    animation: fadeInSlow 1.5s ease 1.4s forwards;
  }
  @keyframes fadeInSlow { to { opacity:1; } }

  /* Glass card */
  .glass-card {
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.18);
    border-radius:24px;
    padding:30px 24px;
    box-shadow:0 8px 32px rgba(0,0,0,0.35);
    margin-bottom:40px;
  }

  .letter-line {
    display:block;
    font-size:clamp(.95rem, 4vw, 1.1rem);
    line-height:2.1;
    color:#fbeaf5;
    opacity:0;
    transform:translateY(12px);
    transition:opacity .8s ease, transform .8s ease;
    margin-bottom:6px;
  }
  .letter-line.show {
    opacity:1;
    transform:translateY(0);
  }
  .highlight {
    color:#ffb6e6;
    font-weight:700;
    position:relative;
    animation: shimmer 4s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%, 100% { text-shadow:0 0 0 rgba(255,182,230,0); }
    50% { text-shadow:0 0 16px rgba(255,182,230,0.9); }
  }

  /* ===================== GALLERY ===================== */
  .gallery-title {
    text-align:center;
    font-size:1.2rem;
    color:#f3d9e8;
    margin-bottom:20px;
    font-weight:700;
  }
  .gallery-grid {
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:12px;
  }
  .gallery-item {
    position:relative;
    width:100%;
    aspect-ratio:1/1;
    border-radius:16px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.18);
    box-shadow:0 6px 20px rgba(0,0,0,0.35);
    cursor:pointer;
    opacity:0;
    transform:scale(0.9);
    transition:opacity .7s ease, transform .7s ease;
  }
  .gallery-item.show {
    opacity:1;
    transform:scale(1);
  }
  .gallery-item img {
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    transition:transform .5s ease, filter .5s ease;
  }
  .gallery-item:active img {
    transform:scale(1.06);
  }
  .gallery-item::after {
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(180deg, rgba(0,0,0,0) 55%, rgba(30,5,25,0.55) 100%);
    pointer-events:none;
  }

  /* Lightbox */
  #lightbox {
    position:fixed;
    inset:0;
    z-index:10000;
    background:rgba(8,3,14,0.94);
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    pointer-events:none;
    transition:opacity .35s ease;
    padding:24px;
  }
  #lightbox.open {
    opacity:1;
    pointer-events:auto;
  }
  #lightbox img {
    max-width:100%;
    max-height:82vh;
    border-radius:14px;
    box-shadow:0 10px 40px rgba(0,0,0,0.6);
    transform:scale(0.92);
    transition:transform .35s ease;
  }
  #lightbox.open img {
    transform:scale(1);
  }
  #lightboxClose {
    position:absolute;
    top:24px;
    right:24px;
    width:44px;
    height:44px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,0.3);
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    color:#fff;
    font-size:1.3rem;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  /* Counter section */
  .counter-title {
    text-align:center;
    font-size:1.2rem;
    color:#f3d9e8;
    margin-bottom:16px;
    font-weight:700;
  }
  .counter-badge {
    display:block;
    text-align:center;
    margin:0 auto 24px;
    width:fit-content;
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.25);
    padding:8px 22px;
    border-radius:999px;
    font-size:1rem;
    letter-spacing:1px;
    color:#ffdff2;
  }
  .counter-grid {
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:10px;
  }
  .counter-item {
    text-align:center;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:16px;
    padding:14px 4px;
  }
  .counter-num {
    font-size:clamp(1.4rem, 6vw, 2rem);
    font-weight:900;
    color:#fff;
    display:inline-block;
    transition:transform .3s ease;
  }
  .counter-num.flip {
    animation:flipNum .5s ease;
  }
  @keyframes flipNum {
    0% { transform:rotateX(0deg); opacity:1; }
    50% { transform:rotateX(90deg); opacity:.3; }
    100% { transform:rotateX(0deg); opacity:1; }
  }
  .counter-label {
    font-size:.7rem;
    color:#e3bcd8;
    margin-top:4px;
    display:block;
  }

  /* Small quote section */
  .quote-section {
    text-align:center;
    font-size:1rem;
    color:#f0d5e6;
    line-height:1.9;
    margin-bottom:50px;
    padding:0 10px;
  }

  /* Music button */
  .music-btn-wrap {
    display:flex;
    justify-content:center;
    margin-bottom:60px;
  }
  #musicBtn {
    width:72px;
    height:72px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,0.3);
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    color:#fff;
    font-size:1.6rem;
    cursor:pointer;
    box-shadow:0 0 20px rgba(255,150,220,0.35);
    animation:btnGlow 2.5s ease-in-out infinite;
  }
  @keyframes btnGlow {
    0%,100% { box-shadow:0 0 12px rgba(255,150,220,0.25); }
    50% { box-shadow:0 0 28px rgba(255,150,220,0.55); }
  }

  /* Ending */
  .ending {
    text-align:center;
    padding-top:20px;
  }
  .crown {
    font-size:1.4rem;
    color:#ffd7ef;
    margin-bottom:10px;
    letter-spacing:2px;
  }
  .made-by {
    font-size:.85rem;
    color:#c79bc0;
    margin-bottom:40px;
  }
  .final-line {
    font-family:'Aref Ruqaa', serif;
    font-size:clamp(1.2rem, 5vw, 1.6rem);
    color:#ffe3f4;
    min-height:1.8em;
    white-space:normal;
  }

  @media (min-width:640px) {
    .letter-line { line-height:2.3; }
    .gallery-grid { grid-template-columns:repeat(3, 1fr); }
  }
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <div class="intro-heart">❤️</div>
  <div class="intro-text" id="introText"></div>
</div>

<!-- BACKGROUND LAYERS -->
<div class="bg-gradient"></div>
<canvas id="stars"></canvas>
<canvas id="hearts"></canvas>
<canvas id="fireworks"></canvas>
<canvas id="touch"></canvas>

<main>

  <div class="title-wrap">
    <div class="title-en">Happy Birthday Salwa ❤️</div>
    <div class="title-ar">عيد ميلاد سعيد سلوى</div>
  </div>

  <div class="glass-card reveal" id="letterCard">
    <div id="letterLines"></div>
  </div>

  <!-- ===== GALLERY ===== -->
  <div class="glass-card reveal" id="galleryCard">
    <div class="gallery-title">لحظاتنا 🤍</div>
    <div class="gallery-grid" id="galleryGrid">
      <div class="gallery-item"><img src="IMG-20260708-WA0019.jpg" alt="ذكرى 1" loading="lazy"></div>
      <div class="gallery-item"><img src="IMG-20260708-WA0020.jpg" alt="ذكرى 2" loading="lazy"></div>
      <div class="gallery-item"><img src="IMG-20260708-WA0021.jpg" alt="ذكرى 3" loading="lazy"></div>
      <div class="gallery-item"><img src="IMG-20260708-WA0023.jpg" alt="ذكرى 4" loading="lazy"></div>
      <div class="gallery-item"><img src="IMG-20260708-WA0024.jpg" alt="ذكرى 5" loading="lazy"></div>
      <div class="gallery-item"><img src="IMG-20260708-WA0025.jpg" alt="ذكرى 6" loading="lazy"></div>
    </div>
  </div>

  <div class="glass-card reveal" id="counterCard">
    <div class="counter-title">حكايتنا بدأت من يوم</div>
    <div class="counter-badge">8 / 6 / 2026</div>
    <div class="counter-grid">
      <div class="counter-item"><span class="counter-num" id="days">0</span><span class="counter-label">📅 Days</span></div>
      <div class="counter-item"><span class="counter-num" id="hours">0</span><span class="counter-label">🕒 Hours</span></div>
      <div class="counter-item"><span class="counter-num" id="minutes">0</span><span class="counter-label">⏰ Minutes</span></div>
      <div class="counter-item"><span class="counter-num" id="seconds">0</span><span class="counter-label">⌛ Seconds</span></div>
    </div>
  </div>

  <div class="quote-section reveal">
    بعض الأشخاص بيدخلوا حياتنا... ويخلوا كل حاجة أجمل من غير ما يحاولوا. 🤍
  </div>

  <div class="music-btn-wrap reveal">
    <button id="musicBtn">❤️</button>
  </div>

  <div class="ending reveal">
    <div class="crown">#القزمة 👑</div>
    <div class="made-by">Made by Mohamed</div>
    <div class="final-line" id="finalLine"></div>
  </div>

</main>

<!-- LIGHTBOX -->
<div id="lightbox">
  <button id="lightboxClose">✕</button>
  <img id="lightboxImg" src="" alt="">
</div>

<audio id="bgAudio" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8e70c5d51.mp3?filename=romantic-piano-13-104610.mp3" type="audio/mpeg">
</audio>

<script>
/* ============ INTRO SEQUENCE ============ */
const introTexts = [
  "دي مش مجرد صفحة ويب...",
  "دي هدية اتعملت مخصوص ليكي. 🤍",
  "كل كلمة فيها اتكتبت من القلب... ❤️"
];
const introTextEl = document.getElementById('introText');
const introEl = document.getElementById('intro');

function typeText(text, el, speed=55) {
  return new Promise(resolve => {
    el.style.opacity = 1;
    el.textContent = '';
    let i = 0;
    const interval = setInterval(() => {
      el.textContent += text[i];
      i++;
      if (i >= text.length) {
        clearInterval(interval);
        resolve();
      }
    }, speed);
  });
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

async function runIntro() {
  for (const line of introTexts) {
    await typeText(line, introTextEl);
    await wait(1500);
    introTextEl.style.transition = 'opacity .6s ease';
    introTextEl.style.opacity = 0;
    await wait(700);
    introTextEl.style.transition = 'none';
  }
  introEl.classList.add('hide');
  await wait(1400);
  introEl.style.display = 'none';
  startFireworks();
  setTimeout(stopFireworks, 2000);
}
runIntro();

/* ============ SCROLL REVEAL ============ */
const revealEls = document.querySelectorAll('.reveal');
const io = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) entry.target.classList.add('in');
  });
}, { threshold: 0.2 });
revealEls.forEach(el => io.observe(el));

/* ============ GALLERY REVEAL + LIGHTBOX ============ */
const galleryItems = document.querySelectorAll('.gallery-item');
const galleryIO = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const items = entry.target.querySelectorAll('.gallery-item');
      items.forEach((item, i) => {
        setTimeout(() => item.classList.add('show'), i * 150);
      });
      galleryIO.unobserve(entry.target);
    }
  });
}, { threshold: 0.2 });
const galleryCardEl = document.getElementById('galleryCard');
if (galleryCardEl) galleryIO.observe(galleryCardEl);

const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightboxImg');
const lightboxClose = document.getElementById('lightboxClose');

galleryItems.forEach(item => {
  item.addEventListener('click', () => {
    const img = item.querySelector('img');
    lightboxImg.src = img.src;
    lightboxImg.alt = img.alt;
    lightbox.classList.add('open');
  });
});

function closeLightbox() {
  lightbox.classList.remove('open');
}
lightboxClose.addEventListener('click', closeLightbox);
lightbox.addEventListener('click', (e) => {
  if (e.target === lightbox) closeLightbox();
});

/* ============ STARS CANVAS ============ */
const starsCanvas = document.getElementById('stars');
const starsCtx = starsCanvas.getContext('2d');
let stars = [];

function resizeCanvases() {
  [starsCanvas, document.getElementById('hearts'), document.getElementById('touch'), document.getElementById('fireworks')].forEach(c => {
    c.width = window.innerWidth;
    c.height = window.innerHeight;
  });
}
resizeCanvases();
window.addEventListener('resize', resizeCanvases);

function initStars() {
  stars = [];
  const count = Math.floor((window.innerWidth * window.innerHeight) / 9000);
  for (let i=0; i<count; i++) {
    stars.push({
      x: Math.random()*starsCanvas.width,
      y: Math.random()*starsCanvas.height,
      r: Math.random()*1.4 + 0.3,
      alpha: Math.random(),
      speed: Math.random()*0.015 + 0.005,
      dir: Math.random() > 0.5 ? 1 : -1
    });
  }
}
initStars();
window.addEventListener('resize', initStars);

function animateStars() {
  starsCtx.clearRect(0,0,starsCanvas.width, starsCanvas.height);
  stars.forEach(s => {
    s.alpha += s.speed * s.dir;
    if (s.alpha <= 0 || s.alpha >= 1) s.dir *= -1;
    starsCtx.beginPath();
    starsCtx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    starsCtx.fillStyle = `rgba(255,255,255,${Math.max(0,Math.min(1,s.alpha))})`;
    starsCtx.fill();
  });
  requestAnimationFrame(animateStars);
}
animateStars();

/* ============ FLOATING HEARTS ============ */
const heartsCanvas = document.getElementById('hearts');
const heartsCtx = heartsCanvas.getContext('2d');
let floatingHearts = [];

function spawnHeart() {
  floatingHearts.push({
    x: Math.random()*heartsCanvas.width,
    y: heartsCanvas.height + 20,
    size: Math.random()*18 + 10,
    speed: Math.random()*1.2 + 0.4,
    drift: (Math.random()-0.5)*0.6,
    alpha: Math.random()*0.5 + 0.35,
    rot: (Math.random()-0.5)*0.6
  });
}

function drawHeart(ctx, x, y, size, alpha, rot) {
  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(rot);
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#ff9ecb';
  ctx.beginPath();
  const s = size/2;
  ctx.moveTo(0, s*0.3);
  ctx.bezierCurveTo(0, 0, -s, 0, -s, s*0.6);
  ctx.bezierCurveTo(-s, s*1.2, 0, s*1.5, 0, s*2);
  ctx.bezierCurveTo(0, s*1.5, s, s*1.2, s, s*0.6);
  ctx.bezierCurveTo(s, 0, 0, 0, 0, s*0.3);
  ctx.fill();
  ctx.restore();
}

function animateHearts() {
  heartsCtx.clearRect(0,0,heartsCanvas.width, heartsCanvas.height);
  if (Math.random() < 0.045) spawnHeart();
  floatingHearts.forEach(h => {
    h.y -= h.speed;
    h.x += h.drift;
    drawHeart(heartsCtx, h.x, h.y, h.size, h.alpha, h.rot);
  });
  floatingHearts = floatingHearts.filter(h => h.y > -40);
  requestAnimationFrame(animateHearts);
}
animateHearts();

/* ============ TOUCH EFFECT ============ */
const touchCanvas = document.getElementById('touch');
const touchCtx = touchCanvas.getContext('2d');
let touchHearts = [];

function spawnTouchHearts(x, y) {
  for (let i=0; i<10; i++) {
    touchHearts.push({
      x, y,
      size: Math.random()*14 + 8,
      speed: Math.random()*2 + 1,
      drift: (Math.random()-0.5)*3,
      alpha: 1,
      rot: (Math.random()-0.5)*1
    });
  }
}

function animateTouchHearts() {
  touchCtx.clearRect(0,0,touchCanvas.width, touchCanvas.height);
  touchHearts.forEach(h => {
    h.y -= h.speed;
    h.x += h.drift;
    h.alpha -= 0.015;
    drawHeart(touchCtx, h.x, h.y, h.size, Math.max(0,h.alpha), h.rot);
  });
  touchHearts = touchHearts.filter(h => h.alpha > 0);
  requestAnimationFrame(animateTouchHearts);
}
animateTouchHearts();

window.addEventListener('pointerdown', (e) => {
  spawnTouchHearts(e.clientX, e.clientY);
});
window.addEventListener('touchstart', (e) => {
  for (const t of e.touches) spawnTouchHearts(t.clientX, t.clientY);
}, {passive:true});

/* ============ FIREWORKS ============ */
const fwCanvas = document.getElementById('fireworks');
const fwCtx = fwCanvas.getContext('2d');
let fwParticles = [];
let fwRunning = false;
let fwInterval = null;

function launchFirework() {
  const x = Math.random()*fwCanvas.width;
  const y = Math.random()*fwCanvas.height*0.5 + 50;
  const colors = ['#ff9ecb','#c77dff','#ffffff','#ffd6ec'];
  const color = colors[Math.floor(Math.random()*colors.length)];
  for (let i=0; i<28; i++) {
    const angle = (Math.PI*2/28)*i;
    const speed = Math.random()*3 + 2;
    fwParticles.push({
      x, y,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed,
      alpha: 1,
      color
    });
  }
}

function animateFireworks() {
  fwCtx.clearRect(0,0,fwCanvas.width, fwCanvas.height);
  fwParticles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.03;
    p.alpha -= 0.015;
    fwCtx.globalAlpha = Math.max(0,p.alpha);
    fwCtx.fillStyle = p.color;
    fwCtx.beginPath();
    fwCtx.arc(p.x, p.y, 2.2, 0, Math.PI*2);
    fwCtx.fill();
  });
  fwCtx.globalAlpha = 1;
  fwParticles = fwParticles.filter(p => p.alpha > 0);
  requestAnimationFrame(animateFireworks);
}
animateFireworks();

function startFireworks() {
  fwRunning = true;
  fwInterval = setInterval(launchFirework, 250);
}
function stopFireworks() {
  clearInterval(fwInterval);
  fwRunning = false;
}

/* ============ LETTER LINE BY LINE ============ */
const letterText = [
  "كل سنة وأنتِ بخير يا <span class='highlight'>سلوى</span>.",
  "يمكن الكلمات عمرها ما توصف اللي جوايا، لكن وجودك كان من أجمل الحاجات اللي غيرت أيامي.",
  "كنتِ السبب في إن اليوم العادي يبقى له معنى، و<span class='highlight'>ابتسامتك</span> كانت كفاية تغير أي يوم وحش لأجمل يوم.",
  "ربنا يخليكِ ليا يا <span class='highlight'>أحلى حاجة حصلتلي</span>، ويديم ضحكتك وفرحتك، ويحققلك كل اللي نفسك فيه،",
  "وتفضلي بنفس القلب الجميل والروح اللي بتنور المكان أول ما تدخليه. 💖",
  "وأتمنى إن كل سنة جاية تكون أحسن من اللي قبلها، وتحققي فيها كل أحلامك، وتعيشي أجمل أيام عمرك.",
  "كل سنة وأنتِ بخير يا سلوى... وكل سنة وأنتِ أغلى الناس. ❤️✨"
];

const letterLinesContainer = document.getElementById('letterLines');
letterText.forEach(line => {
  const span = document.createElement('span');
  span.className = 'letter-line';
  span.innerHTML = line;
  letterLinesContainer.appendChild(span);
});

let letterRevealed = false;
const letterCard = document.getElementById('letterCard');
const letterIO = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting && !letterRevealed) {
      letterRevealed = true;
      const lines = letterLinesContainer.querySelectorAll('.letter-line');
      lines.forEach((line, i) => {
        setTimeout(() => line.classList.add('show'), i * 650);
      });
    }
  });
}, { threshold: 0.25 });
letterIO.observe(letterCard);

/* ============ COUNTDOWN ============ */
const startDate = new Date('2026-06-08T00:00:00');
const daysEl = document.getElementById('days');
const hoursEl = document.getElementById('hours');
const minutesEl = document.getElementById('minutes');
const secondsEl = document.getElementById('seconds');

function updateCounter() {
  const now = new Date();
  let diff = Math.floor((now - startDate) / 1000);
  if (diff < 0) diff = 0;

  const d = Math.floor(diff / 86400);
  const h = Math.floor((diff % 86400) / 3600);
  const m = Math.floor((diff % 3600) / 60);
  const s = diff % 60;

  setCounterValue(daysEl, d);
  setCounterValue(hoursEl, h);
  setCounterValue(minutesEl, m);
  setCounterValue(secondsEl, s);
}

function setCounterValue(el, value) {
  const strValue = String(value);
  if (el.textContent !== strValue) {
    el.textContent = strValue;
    el.classList.remove('flip');
    void el.offsetWidth;
    el.classList.add('flip');
  }
}

updateCounter();
setInterval(updateCounter, 1000);

/* ============ MUSIC BUTTON ============ */
const musicBtn = document.getElementById('musicBtn');
const bgAudio = document.getElementById('bgAudio');
let playing = false;

musicBtn.addEventListener('click', () => {
  if (!playing) {
    bgAudio.play().catch(()=>{});
    musicBtn.textContent = '⏸️';
    playing = true;
  } else {
    bgAudio.pause();
    musicBtn.textContent = '❤️';
    playing = false;
  }
});

/* ============ FINAL LINE ============ */
const finalLineEl = document.getElementById('finalLine');
const finalIO = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      finalIO.unobserve(entry.target);
      setTimeout(async () => {
        await typeText("عقبال العمر كله يا سلوى... 🤍🎉", finalLineEl, 70);
        // small final sparkle burst
        for (let i=0;i<6;i++) spawnHeart();
        launchFirework();
      }, 2000);
    }
  });
}, { threshold: 0.4 });
finalIO.observe(document.querySelector('.ending'));

</script>
